
version: '3.8'
services:
  gateway:
    image: nginx:latest
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    ports: ["80:80"]
    networks: ["wolf_network"]

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: wolf_db
    volumes: ["postgres_data:/var/lib/postgresql/data"]
    networks: ["wolf_network"]

  redis:
    image: redis:alpine
    networks: ["wolf_network"]

networks:
  wolf_network:
    driver: bridge

volumes:
  postgres_data:
