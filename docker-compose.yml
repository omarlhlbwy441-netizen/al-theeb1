
version: '3.8'
networks:
  wolf_network:
    driver: bridge

services:
  gateway:
    image: nginx:alpine
    ports: ["80:80"]
    networks: ["wolf_network"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
    
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: wolf_db
      POSTGRES_PASSWORD: securepassword
    networks: ["wolf_network"]

  finance_service:
    build: ./backend/finance
    networks: ["wolf_network"]
    depends_on: ["postgres"]

  ai_service:
    build: ./ai/core
    networks: ["wolf_network"]

  # التوسع التلقائي يتم عبر كوبرنيتس لاحقاً
