
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wolf-app-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: wolf-app
  template:
    metadata:
      labels:
        app: wolf-app
    spec:
      containers:
      - name: wolf-backend
        image: wolf-app:latest
        resources:
          limits:
            cpu: "0.5"
            memory: "512Mi"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: wolf-scaler
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: wolf-app-deployment
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
