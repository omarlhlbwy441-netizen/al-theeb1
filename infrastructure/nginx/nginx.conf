
server {
    listen 80;
    server_name wolf_super_app;

    location /api/chat/ { proxy_pass http://chat_service:3000/; }
    location /api/finance/ { proxy_pass http://finance_service:3001/; }
    location /api/store/ { proxy_pass http://store_service:3002/; }
    location /api/ai/ { proxy_pass http://ai_service:8000/; }
    location /api/voice/ { proxy_pass http://voice_service:8001/; }
}
